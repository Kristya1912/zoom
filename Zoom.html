        <!-- מודל הגדרות (שמירת תמונות ויצוא) -->
        

    </div>

    <script>
        // מאגר ילדים
        const KIDS_BASE = [
            { id: 'noa', name: 'נועה', color: '#ffdfbf' },
            { id: 'maya', name: 'מאיה', color: '#c0aede' },
            { id: 'yael', name: 'יעל', color: '#ffb6c1' },
            { id: 'tamar', name: 'תמר', color: '#b6e3f4' },
            { id: 'roni', name: 'רוני', color: '#f6d365' },
            { id: 'yossi', name: 'יוסי', color: '#d4fc79' },
            { id: 'dan', name: 'דן', color: '#e0c3fc' },
            { id: 'omer', name: 'עומר', color: '#8fd3f4' },
            { id: 'itay', name: 'איתי', color: '#ffecd2' },
        ];

        const LOCAL_STORAGE_KEY = 'zoom_bingo_offline_images_v2';
        let customImages = {};

        // מצב המשחק
        let boardLayout = [];
        let deck = [];
        let activeCard = null;
        let placedCards = [];
        let isWon = false;

        const icons = {
            user: `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
            micOff: `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-rose-500"><line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
            videoLarge: `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>`,
            imagePlus: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/><line x1="16" y1="5" x2="22" y2="5"/><line x1="19" y1="2" x2="19" y2="8"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>`
        };

        function getDefaultAvatar(name, color) {
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                <rect width="100" height="100" fill="${color}" />
                <text x="50" y="55" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1e293b" text-anchor="middle" dominant-baseline="middle">${name.charAt(0)}</text>
            </svg>`;
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
        }

        // --- פונקציית טעינה משופרת ---
        function loadSavedImages() {
            // 1. קודם נבדוק האם התמונות הושתלו מראש בתוך תגית ה-BODY (במקרה שמישהו קיבל את הקובץ)
            const embeddedData = document.body.getAttribute('data-embedded-images');
            
            if (embeddedData) {
                try {
                    // מפענחים את התמונות מתוך ה-HTML
                    customImages = JSON.parse(decodeURIComponent(embeddedData));
                    return; // הצלחנו לטעון מקובץ מוכן, נסיים כאן.
                } catch (e) {
                    console.error("שגיאה בקריאת תמונות מוטמעות", e);
                }
            }

            // 2. אם לא מצאנו תמונות מוטמעות, נטען מהזיכרון המקומי (למי שיוצרת את המשחק)
            try {
                const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (saved) {
                    customImages = JSON.parse(saved);
                }
            } catch (e) {
                console.error("שגיאה בטעינת תמונות", e);
            }
        }

        function saveImagesToLocal() {
            // לא נשמור זיכרון אם אנחנו במצב "משחק מוכן שנשלח למישהו"
            if (document.body.hasAttribute('data-embedded-images')) return;
            
            try {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(customImages));
            } catch (e) {
                console.error("שגיאה בשמירה", e);
                alert("הזיכרון מלא. נסו לאפס תמונות.");
            }
        }

        // --- פונקציית הייצוא החדשה והעמידה ---
        function exportReadyGame() {
            if (Object.keys(customImages).length === 0) {
                alert("לא העלית אף תמונה! מומלץ להעלות לפחות תמונה אחת לפני ששומרים קובץ למשלוח.");
                return;
            }

            // משכפלים את הדף הנוכחי
            const clone = document.documentElement.cloneNode(true);
            
            // סוגרים חלונות שפתוחים כרגע בגרסה המשוכפלת
            clone.querySelector('#settings-modal')?.classList.replace('flex', 'hidden');
            clone.querySelector('#win-screen')?.classList.replace('flex', 'hidden');

            // --- הופכים את הקובץ לגרסת "שחקן בלבד" ---
            // מוחקים את כפתור ההגדרות ואת מודל ההגדרות מהקובץ שנשלח לילדים!
            clone.querySelector('#btn-settings')?.remove();
            clone.querySelector('#settings-modal')?.remove();

            // --- קסם ההטמעה: נועלים את התמונות בתוך תגית ה-BODY עצמה ---
            const encodedData = encodeURIComponent(JSON.stringify(customImages));
            clone.querySelector('body').setAttribute('data-embedded-images', encodedData);

            // בונים את ה-HTML הסופי
            const htmlContent = "<!DOCTYPE html>\n" + clone.outerHTML;

            // יוצרים הורדה למחשב
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'zoom-game-ready.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert("הקובץ 'zoom-game-ready.html' ירד למחשב שלך!\nעכשיו התמונות נעולות בתוכו והוא מוכן לשליחה בוואטסאפ או במייל.");
        }

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function getImageForKid(kid) {
            return customImages[kid.id] || getDefaultAvatar(kid.name, kid.color);
        }

        function initGame() {
            boardLayout = shuffleArray(KIDS_BASE);
            deck = shuffleArray(KIDS_BASE);
            activeCard = null;
            placedCards = [];
            isWon = false;
            
            document.getElementById('win-screen')?.classList.replace('flex', 'hidden');
            renderBoard();
            renderDeck();
        }

        function handleDrawCard() {
            if (activeCard || deck.length === 0) return;
            activeCard = deck.pop();
            renderDeck();
        }

        function handlePlacement(cellId) {
            if (activeCard && activeCard.id === cellId) {
                placedCards.push(activeCard.id);
                activeCard = null;
                
                if (placedCards.length === KIDS_BASE.length) {
                    isWon = true;
                    document.getElementById('win-screen').classList.replace('hidden', 'flex');
                }
                
                renderBoard();
                renderDeck();
            }
        }

        function renderBoard() {
            const container = document.getElementById('board-container');
            if (!container) return;
            container.innerHTML = '';

            boardLayout.forEach(kid => {
                const isPlaced = placedCards.includes(kid.id);
                const cell = document.createElement('div');
                cell.className = `relative aspect-video bg-slate-800 rounded-lg overflow-hidden border-2 transition-all cursor-pointer ${isPlaced ? 'border-emerald-500 shadow-lg shadow-emerald-500/20' : 'border-slate-700 hover:border-slate-600'}`;
                
                cell.onclick = () => handlePlacement(kid.id);

                if (isPlaced) {
                    cell.innerHTML = `
                        <img src="${getImageForKid(kid)}" alt="${kid.name}" class="w-full h-full object-cover animate-zoom-in bg-white" />
                        <div class="absolute bottom-1 right-1 left-1 flex justify-between items-center px-2 py-0.5 bg-black/60 backdrop-blur-md rounded text-white text-[10px] sm:text-xs">
                            <span class="truncate">${kid.name}</span>
                        </div>
                    `;
                } else {
                    cell.innerHTML = `
                        <div class="w-full h-full flex items-center justify-center opacity-20">
                            ${icons.user}
                        </div>
                        <div class="absolute bottom-1 right-1 left-1 flex justify-between items-center px-2 py-0.5 bg-black/60 backdrop-blur-md rounded text-white text-[10px] sm:text-xs">
                            <span class="truncate">${kid.name}</span>
                            ${icons.micOff}
                        </div>
                    `;
                }
                container.appendChild(cell);
            });
        }

        function renderDeck() {
            const container = document.getElementById('deck-container');
            const counter = document.getElementById('deck-counter');
            if (!container || !counter) return;
            
            container.innerHTML = '';
            counter.innerText = `קלפים שנותרו: ${deck.length}`;

            if (!activeCard && deck.length > 0) {
                const btn = document.createElement('button');
                btn.className = "w-full h-full bg-blue-600 rounded-2xl shadow-lg border-4 border-blue-400 flex flex-col items-center justify-center text-white gap-3 hover:scale-105 transition-transform active:scale-95";
                btn.onclick = handleDrawCard;
                btn.innerHTML = `
                    <div class="p-4 bg-white/20 rounded-full">${icons.videoLarge}</div>
                    <span class="font-bold text-lg">משוך קלף</span>
                `;
                container.appendChild(btn);
            } else if (activeCard) {
                const cardView = document.createElement('div');
                cardView.className = "w-full h-full bg-slate-50 rounded-2xl border-2 border-blue-200 p-4 flex flex-col items-center justify-center shadow-inner animate-slide-up";
                cardView.innerHTML = `
                    <div class="w-28 h-28 rounded-full overflow-hidden border-4 border-white shadow-md mb-4 bg-white flex items-center justify-center relative">
                        <img src="${getImageForKid(activeCard)}" alt="${activeCard.name}" class="w-full h-full object-cover absolute inset-0" />
                    </div>
                    <span class="text-2xl font-black text-slate-800">${activeCard.name}</span>
                    <p class="text-xs text-blue-500 mt-2 font-bold">לחץ על הילד הנכון בלוח</p>
                `;
                container.appendChild(cardView);
            } else {
                container.innerHTML = `<div class="text-slate-400 font-medium italic">החפיסה ריקה!</div>`;
            }
        }

        function renderSettings() {
            const container = document.getElementById('settings-grid');
            if (!container) return;
            container.innerHTML = '';

            KIDS_BASE.forEach(kid => {
                const item = document.createElement('div');
                item.className = "flex flex-col items-center bg-slate-50 p-4 rounded-2xl border border-slate-200 relative overflow-hidden";
                
                item.innerHTML = `
                    <img src="${getImageForKid(kid)}" alt="${kid.name}" class="w-20 h-20 rounded-full object-cover mb-3 border-2 border-white shadow-sm bg-white" />
                    <span class="font-bold text-slate-700 mb-3">${kid.name}</span>
                    <label class="cursor-pointer bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700 transition-colors flex items-center gap-2 text-sm font-semibold w-full justify-center">
                        ${icons.imagePlus} העלה
                        <input type="file" accept="image/*" class="hidden file-input" data-id="${kid.id}" />
                    </label>
                `;
                container.appendChild(item);
            });

            document.querySelectorAll('.file-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    handleImageUpload(e.target.dataset.id, e.target.files[0]);
                });
            });
        }

        const handleImageUpload = (id, file) => {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 250; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height = Math.round((height *= MAX_SIZE / width));
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width = Math.round((width *= MAX_SIZE / height));
                            height = MAX_SIZE;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);

                    customImages[id] = compressedDataUrl;
                    saveImagesToLocal();
                    
                    renderSettings();
                    renderBoard();
                    if(activeCard) renderDeck();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        const clearAllImages = () => {
            if (!window.confirm('האם לאפס את כל התמונות?')) return;
            customImages = {};
            saveImagesToLocal();
            renderSettings();
            renderBoard();
            if(activeCard) renderDeck();
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedImages(); // נטען בהתחלה את התמונות!
            
            // חיבור כפתורים רק אם הם קיימים (הם נמחקים בקובץ המיוצא)
            const btnSettings = document.getElementById('btn-settings');
            if (btnSettings) {
                btnSettings.addEventListener('click', () => {
                    renderSettings();
                    document.getElementById('settings-modal').classList.replace('hidden', 'flex');
                });
            }
            
            const btnCloseSettings = document.getElementById('btn-close-settings');
            if (btnCloseSettings) {
                btnCloseSettings.addEventListener('click', () => {
                    document.getElementById('settings-modal').classList.replace('flex', 'hidden');
                });
            }
            
            const btnFinishSettings = document.getElementById('btn-finish-settings');
            if (btnFinishSettings) {
                btnFinishSettings.addEventListener('click', () => {
                    document.getElementById('settings-modal').classList.replace('flex', 'hidden');
                });
            }

            const btnExport = document.getElementById('btn-export-game');
            if (btnExport) btnExport.addEventListener('click', exportReadyGame);

            const btnClear = document.getElementById('btn-clear-images');
            if (btnClear) btnClear.addEventListener('click', clearAllImages);

            document.getElementById('btn-restart')?.addEventListener('click', initGame);
            document.getElementById('btn-win-restart')?.addEventListener('click', initGame);

            initGame();
        });

    </script>

</body></html>
